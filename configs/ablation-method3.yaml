# =============================================================================
# T2V-Eval Configuration - ablation-method3
# 3 groups for pyramid-forcing method ablations
# 12D profile: aligned with configs/prompts128-30s-v2.yaml
# 123 latent frames x VAE 4 = 492 actual frames, sampled at 60% = 295 frames
# =============================================================================

dataset:
  repo_id: "kv-compression/AdaHead"
  split: "train"
  use_local_videos: true
  local_video_dir: "local/ablation-method3"
  prompt_files_by_group:
    pyramid-forcing-ablate-1_stable_stride: "local/ablation-method3/pyramid-forcing-ablate-1_stable_stride/prompts.csv"
    pyramid-forcing-ablate-2_stable_merge: "local/ablation-method3/pyramid-forcing-ablate-2_stable_merge/prompts.csv"
    pyramid-forcing-ablate-3_full_mixed: "local/ablation-method3/pyramid-forcing-ablate-3_full_mixed/prompts.csv"
  # Current pipeline accepts one fallback prompt_file.
  # Assume all groups share the same prompt schema keyed by video_id.
  # If prompts differ by group, merge them first and then update prompt_file.
  prompt_file: "local/ablation-method3/pyramid-forcing-ablate-1_stable_stride/prompts.csv"
  video_dir: "videos/ablation-method3"

groups:
  - name: "pyramid-forcing-ablate-1_stable_stride"
    description: "Pyramid forcing ablation 1 stable stride"
    latent_frames: 123
    actual_frames: 492
  - name: "pyramid-forcing-ablate-2_stable_merge"
    description: "Pyramid forcing ablation 2 stable merge"
    latent_frames: 123
    actual_frames: 492
  - name: "pyramid-forcing-ablate-3_full_mixed"
    description: "Pyramid forcing ablation 3 full mixed"
    latent_frames: 123
    actual_frames: 492

protocol:
  fps_eval: 8
  num_frames: 295
  resize: 256
  frame_sampling: "uniform"
  frame_padding: "loop"

metrics:
  enabled:
    - "vbench_temporal"

  vbench:
    enabled: true
    backend: "vbench_long"
    use_long: true
    strict_integrity: true
    require_full_coverage: true
    group_mismatch_warn_only: false
    preprocess_workers: 48
    slow_dims_fused: true
    slow_dims_decode_total_workers: 48
    slow_dims_decode_prefetch: 24
    slow_dims_decode_backend: "decord"
    slow_dims_shard_mode: "clip"
    slow_dims_perf_window_clips: 5
    slow_dims_stage_profile: true
    grit_batch_parallel_enable: false
    appearance_style_batch_enable: true
    appearance_style_batch_size: 16
    dynamic_degree_batch_enable: true
    dynamic_degree_pair_batch_size: 8
    batch_accel_fp16_enable: false
    batch_accel_strict_fp32: true
    scale_to_percent: []
    profile_output: "group_summary_lite12d.csv"
    dimension_profile: "long_12"
    mode: "long_custom_input"
    use_semantic_splitting: false
    clip_length_config: "clip_length_mix.yaml"
    static_filter_flag: false
    scene_threshold: 35.0
    sb_clip2clip_feat_extractor: "dino"
    bg_clip2clip_feat_extractor: "clip"
    subtasks:
      - "subject_consistency"
      - "background_consistency"
      - "temporal_flickering"
      - "motion_smoothness"
      - "temporal_style"
      - "appearance_style"
      - "scene"
      - "human_action"
      - "overall_consistency"
      - "dynamic_degree"
      - "imaging_quality"
      - "aesthetic_quality"

runtime:
  device: "cuda"
  batch_size: 1
  num_workers: 4
  seed: 42

paths:
  cache_dir: "./eval_cache"
  output_dir: "./outputs/ablation-method3"
  metadata_file: "metadata.csv"
  processed_metadata: "processed_metadata.csv"
  per_video_metrics: "per_video_metrics.csv"
  group_summary: "group_summary.csv"
  runtime_csv: "runtime.csv"
  figures_dir: "./outputs/ablation-method3/figs"
  experiment_output: "ablation-method3.csv"

logging:
  level: "INFO"
  log_file: "./outputs/ablation-method3/eval.log"
  console: true
