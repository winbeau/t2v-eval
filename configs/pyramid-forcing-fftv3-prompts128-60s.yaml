# =============================================================================
# T2V-Eval Configuration - pyramid-forcing-fftv3-prompts128-60s
# 2 groups for Pyramid Forcing FFTv3 128-prompt comparison on local videos
# VBench-Long lite 12D, 128 videos per group
# 243 latent frames x VAE 4 = 972 actual frames, sampled at 60% = 583 frames
# =============================================================================

dataset:
  repo_id: "kv-compression/AdaHead"
  split: "train"
  use_local_videos: true
  local_video_dir: "local/pyramid-forcing-fftv3-prompts128-60s"
  prompt_files_by_group:
    pyramid-forcing-best10-60s: "local/pyramid-forcing-fftv3-prompts128-60s/pyramid-forcing-best10-60s/prompts.csv"
    pyramid-forcing-best-60s: "local/pyramid-forcing-fftv3-prompts128-60s/pyramid-forcing-best-60s/prompts.csv"
  # Current pipeline accepts one fallback prompt_file.
  # Assume all groups share the same prompt schema keyed by video_id.
  # If prompts differ by group, merge them first and then update prompt_file.
  prompt_file: "local/pyramid-forcing-fftv3-prompts128-60s/pyramid-forcing-best10-60s/prompts.csv"
  video_dir: "videos/pyramid-forcing-fftv3-prompts128-60s"

groups:
  - name: "pyramid-forcing-best10-60s"
    description: "Pyramid forcing best10 60s"
    latent_frames: 243
    actual_frames: 972
  - name: "pyramid-forcing-best-60s"
    description: "Pyramid forcing best 60s"
    latent_frames: 243
    actual_frames: 972

group_categories:
  by_variant:
    selected_top10:
      - "pyramid-forcing-best10-60s"
    selected_best:
      - "pyramid-forcing-best-60s"

protocol:
  fps_eval: 8
  num_frames: 583
  resize: 256
  frame_sampling: "uniform"
  frame_padding: "loop"

metrics:
  enabled:
    - "vbench_temporal"

  vbench:
    enabled: true
    backend: "vbench_long"
    use_long: true
    strict_integrity: true
    require_full_coverage: true
    group_mismatch_warn_only: false
    preprocess_workers: 48
    slow_dims_fused: true
    slow_dims_decode_total_workers: 48
    slow_dims_decode_prefetch: 24
    slow_dims_decode_backend: "decord"
    slow_dims_shard_mode: "clip"
    slow_dims_perf_window_clips: 5
    slow_dims_stage_profile: true
    grit_batch_parallel_enable: false
    grit_batch_size: 1
    grit_batch_adaptive_fallback_enable: false
    appearance_style_batch_enable: true
    appearance_style_batch_size: 16
    dynamic_degree_batch_enable: true
    dynamic_degree_pair_batch_size: 8
    batch_accel_fp16_enable: false
    batch_accel_strict_fp32: true
    scale_to_percent: []
    profile_output: "group_summary_lite12d.csv"
    dimension_profile: "long_12"
    mode: "long_custom_input"
    use_semantic_splitting: false
    clip_length_config: "clip_length_mix.yaml"
    static_filter_flag: false
    scene_threshold: 35.0
    sb_clip2clip_feat_extractor: "dino"
    bg_clip2clip_feat_extractor: "clip"
    subtasks:
      - "subject_consistency"
      - "background_consistency"
      - "temporal_flickering"
      - "motion_smoothness"
      - "temporal_style"
      - "appearance_style"
      - "scene"
      - "human_action"
      - "overall_consistency"
      - "dynamic_degree"
      - "imaging_quality"
      - "aesthetic_quality"

runtime:
  device: "cuda"
  batch_size: 1
  num_workers: 4
  seed: 42

paths:
  cache_dir: "./eval_cache"
  output_dir: "./outputs/pyramid-forcing-fftv3-prompts128-60s"
  metadata_file: "metadata.csv"
  processed_metadata: "processed_metadata.csv"
  per_video_metrics: "per_video_metrics.csv"
  group_summary: "group_summary.csv"
  runtime_csv: "runtime.csv"
  figures_dir: "./outputs/pyramid-forcing-fftv3-prompts128-60s/figs"
  experiment_output: "pyramid-forcing-fftv3-prompts128-60s.csv"

logging:
  level: "INFO"
  log_file: "./outputs/pyramid-forcing-fftv3-prompts128-60s/eval.log"
  console: true
