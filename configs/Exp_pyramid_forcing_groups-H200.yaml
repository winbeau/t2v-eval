# =============================================================================
# T2V-Eval Configuration - Exp_pyramid_forcing_groups-H200
# 6 groups (g1-g6), local videos
# 12D profile: 16D minus 4 GrIT-based dims (object_class, multiple_objects,
# spatial_relationship, color) which are unreliable on custom prompts.
# =============================================================================

dataset:
  repo_id: "kv-compression/AdaHead"
  split: "train"
  use_local_videos: true
  local_video_dir: "local/Exp_pyramid_forcing_groups"
  prompt_files_by_group:
    g1: "local/Exp_pyramid_forcing_groups/g1/prompts.csv"
    g2: "local/Exp_pyramid_forcing_groups/g2/prompts.csv"
    g3: "local/Exp_pyramid_forcing_groups/g3/prompts.csv"
    g4: "local/Exp_pyramid_forcing_groups/g4/prompts.csv"
    g5: "local/Exp_pyramid_forcing_groups/g5/prompts.csv"
    g6: "local/Exp_pyramid_forcing_groups/g6/prompts.csv"
  # Current pipeline accepts one fallback prompt_file.
  # Assume all groups share the same prompt schema keyed by video_id.
  # If prompts differ by group, merge them first and then update prompt_file.
  prompt_file: "local/Exp_pyramid_forcing_groups/g1/prompts.csv"
  video_dir: "videos/Exp_pyramid_forcing_groups"

groups:
  - name: "g1"
    description: "Group 1"
    latent_frames: 120
    actual_frames: 480
  - name: "g2"
    description: "Group 2"
    latent_frames: 120
    actual_frames: 480
  - name: "g3"
    description: "Group 3"
    latent_frames: 120
    actual_frames: 480
  - name: "g4"
    description: "Group 4"
    latent_frames: 120
    actual_frames: 480
  - name: "g5"
    description: "Group 5"
    latent_frames: 120
    actual_frames: 480
  - name: "g6"
    description: "Group 6"
    latent_frames: 120
    actual_frames: 480

protocol:
  fps_eval: 8
  num_frames: 288
  resize: 256
  frame_sampling: "uniform"
  frame_padding: "loop"

metrics:
  enabled:
    - "vbench_temporal"

  vbench:
    enabled: true
    backend: "vbench_long"
    use_long: true
    strict_integrity: true
    require_full_coverage: true
    group_mismatch_warn_only: false
    preprocess_workers: 48
    slow_dims_fused: true
    slow_dims_decode_total_workers: 48
    slow_dims_decode_prefetch: 24
    slow_dims_decode_backend: "decord"
    slow_dims_shard_mode: "clip"
    slow_dims_perf_window_clips: 5
    slow_dims_stage_profile: true
    grit_batch_parallel_enable: false
    appearance_style_batch_enable: true
    appearance_style_batch_size: 16
    dynamic_degree_batch_enable: true
    dynamic_degree_pair_batch_size: 8
    batch_accel_fp16_enable: false
    batch_accel_strict_fp32: true
    scale_to_percent: []
    profile_output: "group_summary_lite12d.csv"
    dimension_profile: "long_12"
    mode: "long_custom_input"
    use_semantic_splitting: false
    clip_length_config: "clip_length_mix.yaml"
    static_filter_flag: false
    scene_threshold: 35.0
    sb_clip2clip_feat_extractor: "dino"
    bg_clip2clip_feat_extractor: "clip"
    subtasks:
      - "subject_consistency"
      - "background_consistency"
      - "temporal_flickering"
      - "motion_smoothness"
      - "temporal_style"
      - "appearance_style"
      - "scene"
      - "human_action"
      - "overall_consistency"
      - "dynamic_degree"
      - "imaging_quality"
      - "aesthetic_quality"

runtime:
  device: "cuda"
  batch_size: 1
  num_workers: 4
  seed: 42

paths:
  cache_dir: "./eval_cache"
  output_dir: "./outputs/Exp_pyramid_forcing_groups-H200"
  metadata_file: "metadata.csv"
  processed_metadata: "processed_metadata.csv"
  per_video_metrics: "per_video_metrics.csv"
  group_summary: "group_summary.csv"
  runtime_csv: "runtime.csv"
  figures_dir: "./outputs/Exp_pyramid_forcing_groups-H200/figs"
  experiment_output: "Exp_pyramid_forcing_groups-H200.csv"

logging:
  level: "INFO"
  log_file: "./outputs/Exp_pyramid_forcing_groups-H200/eval.log"
  console: true
