# =============================================================================
# T2V-Eval Configuration - Exp-X_BatchGritTest
# Minimal test: 3 groups (k3, k6, k7) × 25 videos = 75 videos
# Only runs the 4 GrIT-based VBench dimensions to verify batch inference.
# =============================================================================

dataset:
  repo_id: "kv-compression/AdaHead"
  split: "train"
  use_local_videos: true
  local_video_dir: "hf/AdaHead/Exp-K_StaOscCompression"
  prompt_files_by_group:
    k3_sta_posneg_osc_phase6_tail4: "hf/AdaHead/Exp-K_StaOscCompression/k3_sta_posneg_osc_phase6_tail4/prompts.csv"
    k6_deep_forcing: "hf/AdaHead/Exp-K_StaOscCompression/k6_deep_forcing/prompts.csv"
    k7_native_self_forcing_static21_sink1: "hf/AdaHead/Exp-K_StaOscCompression/k7_native_self_forcing_static21_sink1/prompts.csv"
  prompt_file: "hf/AdaHead/Exp-K_StaOscCompression/k3_sta_posneg_osc_phase6_tail4/prompts.csv"
  video_dir: "videos/Exp-X_BatchGritTest"

groups:
  - name: "k3_sta_posneg_osc_phase6_tail4"
    description: "Static pos/neg oscillation, phase6 tail4"
    latent_frames: 120
    actual_frames: 480
  - name: "k6_deep_forcing"
    description: "Deep forcing variant"
    latent_frames: 120
    actual_frames: 480
  - name: "k7_native_self_forcing_static21_sink1"
    description: "Native self-forcing static21 sink1"
    latent_frames: 120
    actual_frames: 480

protocol:
  fps_eval: 8
  num_frames: 288
  resize: 256
  frame_sampling: "uniform"
  frame_padding: "loop"

metrics:
  enabled:
    - "vbench_temporal"

  vbench:
    enabled: true
    backend: "vbench_long"
    use_long: true
    preprocess_workers: 48
    scale_to_percent: []
    profile_output: "group_summary_grit_test.csv"
    dimension_profile: "long_16"
    mode: "long_custom_input"
    use_semantic_splitting: false
    clip_length_config: "clip_length_mix.yaml"
    static_filter_flag: false
    scene_threshold: 35.0
    sb_clip2clip_feat_extractor: "dino"
    bg_clip2clip_feat_extractor: "clip"
    subtasks:
      - "object_class"
      - "multiple_objects"
      - "spatial_relationship"
      - "color"

runtime:
  device: "cuda"
  batch_size: 1
  num_workers: 4
  seed: 42

paths:
  cache_dir: "./eval_cache"
  output_dir: "./outputs/Exp-X_BatchGritTest"
  metadata_file: "metadata.csv"
  processed_metadata: "processed_metadata.csv"
  per_video_metrics: "per_video_metrics.csv"
  group_summary: "group_summary.csv"
  runtime_csv: "runtime.csv"
  figures_dir: "./outputs/Exp-X_BatchGritTest/figs"
  experiment_output: "Exp-X_BatchGritTest.csv"

logging:
  level: "INFO"
  log_file: "./outputs/Exp-X_BatchGritTest/eval.log"
  console: true
