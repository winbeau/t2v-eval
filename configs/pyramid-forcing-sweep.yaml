group_categories:
  by_stage:
    s1: ["sta_minus_s1_r2", "sta_minus_s1_r3", "sta_minus_s1_r4", "sta_minus_s1_r5", "sta_minus_s1_r6"]
    s2: ["sta_minus_s2_r2", "sta_minus_s2_r3", "sta_minus_s2_r4", "sta_minus_s2_r5", "sta_minus_s2_r6"]
    s3: ["sta_minus_s3_r2", "sta_minus_s3_r3", "sta_minus_s3_r4", "sta_minus_s3_r5", "sta_minus_s3_r6"]
    s4: ["sta_minus_s4_r2", "sta_minus_s4_r3", "sta_minus_s4_r4", "sta_minus_s4_r5", "sta_minus_s4_r6"]
    s5: ["sta_minus_s5_r2", "sta_minus_s5_r3", "sta_minus_s5_r4", "sta_minus_s5_r5", "sta_minus_s5_r6"]
  by_ratio:
    r2: ["sta_minus_s1_r2", "sta_minus_s2_r2", "sta_minus_s3_r2", "sta_minus_s4_r2", "sta_minus_s5_r2"]
    r3: ["sta_minus_s1_r3", "sta_minus_s2_r3", "sta_minus_s3_r3", "sta_minus_s4_r3", "sta_minus_s5_r3"]
    r4: ["sta_minus_s1_r4", "sta_minus_s2_r4", "sta_minus_s3_r4", "sta_minus_s4_r4", "sta_minus_s5_r4"]
    r5: ["sta_minus_s1_r5", "sta_minus_s2_r5", "sta_minus_s3_r5", "sta_minus_s4_r5", "sta_minus_s5_r5"]
    r6: ["sta_minus_s1_r6", "sta_minus_s2_r6", "sta_minus_s3_r6", "sta_minus_s4_r6", "sta_minus_s5_r6"]

protocol:
  fps_eval: 8
  num_frames: 288
  resize: 256
  frame_sampling: "uniform"
  frame_padding: "loop"

metrics:
  enabled:
    - "vbench_temporal"

  vbench:
    enabled: true
    backend: "vbench_long"
    use_long: true
    strict_integrity: true
    require_full_coverage: true
    group_mismatch_warn_only: false
    preprocess_workers: 48
    slow_dims_fused: true
    slow_dims_decode_total_workers: 48
    slow_dims_decode_prefetch: 24
    slow_dims_decode_backend: "decord"
    slow_dims_shard_mode: "clip"
    slow_dims_perf_window_clips: 5
    slow_dims_stage_profile: true
    grit_batch_parallel_enable: false
    appearance_style_batch_enable: true
    appearance_style_batch_size: 16
    dynamic_degree_batch_enable: true
    dynamic_degree_pair_batch_size: 8
    batch_accel_fp16_enable: false
    batch_accel_strict_fp32: true
    scale_to_percent: []
    profile_output: "group_summary_lite12d.csv"
    dimension_profile: "long_12"
    mode: "long_custom_input"
    use_semantic_splitting: false
    clip_length_config: "clip_length_mix.yaml"
    static_filter_flag: false
    scene_threshold: 35.0
    sb_clip2clip_feat_extractor: "dino"
    bg_clip2clip_feat_extractor: "clip"
    subtasks:
      - "subject_consistency"
      - "background_consistency"
      - "temporal_flickering"
      - "motion_smoothness"
      - "temporal_style"
      - "appearance_style"
      - "scene"
      - "human_action"
      - "overall_consistency"
      - "dynamic_degree"
      - "imaging_quality"
      - "aesthetic_quality"

runtime:
  device: "cuda"
  batch_size: 1
  num_workers: 4
  seed: 42

paths:
  cache_dir: "./eval_cache"
  output_dir: "./outputs/pyramid-forcing-sweep"
  metadata_file: "metadata.csv"
  processed_metadata: "processed_metadata.csv"
  per_video_metrics: "per_video_metrics.csv"
  group_summary: "group_summary.csv"
  runtime_csv: "runtime.csv"
  figures_dir: "./outputs/pyramid-forcing-sweep/figs"
  experiment_output: "pyramid-forcing-sweep.csv"

logging:
  level: "INFO"
  log_file: "./outputs/pyramid-forcing-sweep/eval.log"
  console: true
