# =============================================================================
# T2V-Eval Configuration - pyramid-forcing-fftv3
# 14 groups, 32 videos per group, local videos
# VBench-Long lite 12D profile.
# User-specified frame profile: 123 latent frames x VAE 4 = 492 actual frames,
# sampled at 60% = 295 frames. Folder names contain "72frame" but are kept as
# group labels only.
# =============================================================================

dataset:
  repo_id: "kv-compression/AdaHead"
  split: "train"
  use_local_videos: true
  local_video_dir: "local/pyramid-forcing-fftv3"
  prompt_files_by_group:
    diff_thp_256prompt_72frame_10.0thp_80ths: "local/pyramid-forcing-fftv3/diff_thp_256prompt_72frame_10.0thp_80ths/prompts.csv"
    diff_thp_256prompt_72frame_6.5thp_80ths: "local/pyramid-forcing-fftv3/diff_thp_256prompt_72frame_6.5thp_80ths/prompts.csv"
    diff_thp_256prompt_72frame_7.0thp_80ths: "local/pyramid-forcing-fftv3/diff_thp_256prompt_72frame_7.0thp_80ths/prompts.csv"
    diff_thp_256prompt_72frame_8.0thp_80ths: "local/pyramid-forcing-fftv3/diff_thp_256prompt_72frame_8.0thp_80ths/prompts.csv"
    diff_thp_256prompt_72frame_9.0thp_80ths: "local/pyramid-forcing-fftv3/diff_thp_256prompt_72frame_9.0thp_80ths/prompts.csv"
    diff_ths_256prompt_72frame_10.0thp_70ths: "local/pyramid-forcing-fftv3/diff_ths_256prompt_72frame_10.0thp_70ths/prompts.csv"
    diff_ths_256prompt_72frame_10.0thp_80ths: "local/pyramid-forcing-fftv3/diff_ths_256prompt_72frame_10.0thp_80ths/prompts.csv"
    diff_ths_256prompt_72frame_10.0thp_90ths: "local/pyramid-forcing-fftv3/diff_ths_256prompt_72frame_10.0thp_90ths/prompts.csv"
    diff_ths_256prompt_72frame_6.4thp_70ths: "local/pyramid-forcing-fftv3/diff_ths_256prompt_72frame_6.4thp_70ths/prompts.csv"
    diff_ths_256prompt_72frame_6.4thp_80ths: "local/pyramid-forcing-fftv3/diff_ths_256prompt_72frame_6.4thp_80ths/prompts.csv"
    diff_ths_256prompt_72frame_6.4thp_90ths: "local/pyramid-forcing-fftv3/diff_ths_256prompt_72frame_6.4thp_90ths/prompts.csv"
    diff_ths_256prompt_72frame_6.5thp_70ths: "local/pyramid-forcing-fftv3/diff_ths_256prompt_72frame_6.5thp_70ths/prompts.csv"
    diff_ths_256prompt_72frame_6.5thp_80ths: "local/pyramid-forcing-fftv3/diff_ths_256prompt_72frame_6.5thp_80ths/prompts.csv"
    diff_ths_256prompt_72frame_6.5thp_90ths: "local/pyramid-forcing-fftv3/diff_ths_256prompt_72frame_6.5thp_90ths/prompts.csv"
  # Current pipeline accepts one fallback prompt_file.
  # Assume all groups share the same prompt schema keyed by video_id.
  # If prompts differ by group, merge them first and then update prompt_file.
  prompt_file: "local/pyramid-forcing-fftv3/diff_thp_256prompt_72frame_10.0thp_80ths/prompts.csv"
  video_dir: "videos/pyramid-forcing-fftv3"

groups:
  - name: "diff_thp_256prompt_72frame_10.0thp_80ths"
    description: "Diff THP, 10.0 THP, 80 THS"
    latent_frames: 123
    actual_frames: 492
  - name: "diff_thp_256prompt_72frame_6.5thp_80ths"
    description: "Diff THP, 6.5 THP, 80 THS"
    latent_frames: 123
    actual_frames: 492
  - name: "diff_thp_256prompt_72frame_7.0thp_80ths"
    description: "Diff THP, 7.0 THP, 80 THS"
    latent_frames: 123
    actual_frames: 492
  - name: "diff_thp_256prompt_72frame_8.0thp_80ths"
    description: "Diff THP, 8.0 THP, 80 THS"
    latent_frames: 123
    actual_frames: 492
  - name: "diff_thp_256prompt_72frame_9.0thp_80ths"
    description: "Diff THP, 9.0 THP, 80 THS"
    latent_frames: 123
    actual_frames: 492
  - name: "diff_ths_256prompt_72frame_10.0thp_70ths"
    description: "Diff THS, 10.0 THP, 70 THS"
    latent_frames: 123
    actual_frames: 492
  - name: "diff_ths_256prompt_72frame_10.0thp_80ths"
    description: "Diff THS, 10.0 THP, 80 THS"
    latent_frames: 123
    actual_frames: 492
  - name: "diff_ths_256prompt_72frame_10.0thp_90ths"
    description: "Diff THS, 10.0 THP, 90 THS"
    latent_frames: 123
    actual_frames: 492
  - name: "diff_ths_256prompt_72frame_6.4thp_70ths"
    description: "Diff THS, 6.4 THP, 70 THS"
    latent_frames: 123
    actual_frames: 492
  - name: "diff_ths_256prompt_72frame_6.4thp_80ths"
    description: "Diff THS, 6.4 THP, 80 THS"
    latent_frames: 123
    actual_frames: 492
  - name: "diff_ths_256prompt_72frame_6.4thp_90ths"
    description: "Diff THS, 6.4 THP, 90 THS"
    latent_frames: 123
    actual_frames: 492
  - name: "diff_ths_256prompt_72frame_6.5thp_70ths"
    description: "Diff THS, 6.5 THP, 70 THS"
    latent_frames: 123
    actual_frames: 492
  - name: "diff_ths_256prompt_72frame_6.5thp_80ths"
    description: "Diff THS, 6.5 THP, 80 THS"
    latent_frames: 123
    actual_frames: 492
  - name: "diff_ths_256prompt_72frame_6.5thp_90ths"
    description: "Diff THS, 6.5 THP, 90 THS"
    latent_frames: 123
    actual_frames: 492

group_categories:
  by_diff_target:
    diff_thp:
      - "diff_thp_256prompt_72frame_10.0thp_80ths"
      - "diff_thp_256prompt_72frame_6.5thp_80ths"
      - "diff_thp_256prompt_72frame_7.0thp_80ths"
      - "diff_thp_256prompt_72frame_8.0thp_80ths"
      - "diff_thp_256prompt_72frame_9.0thp_80ths"
    diff_ths:
      - "diff_ths_256prompt_72frame_10.0thp_70ths"
      - "diff_ths_256prompt_72frame_10.0thp_80ths"
      - "diff_ths_256prompt_72frame_10.0thp_90ths"
      - "diff_ths_256prompt_72frame_6.4thp_70ths"
      - "diff_ths_256prompt_72frame_6.4thp_80ths"
      - "diff_ths_256prompt_72frame_6.4thp_90ths"
      - "diff_ths_256prompt_72frame_6.5thp_70ths"
      - "diff_ths_256prompt_72frame_6.5thp_80ths"
      - "diff_ths_256prompt_72frame_6.5thp_90ths"
  by_thp:
    thp_6_4:
      - "diff_ths_256prompt_72frame_6.4thp_70ths"
      - "diff_ths_256prompt_72frame_6.4thp_80ths"
      - "diff_ths_256prompt_72frame_6.4thp_90ths"
    thp_6_5:
      - "diff_thp_256prompt_72frame_6.5thp_80ths"
      - "diff_ths_256prompt_72frame_6.5thp_70ths"
      - "diff_ths_256prompt_72frame_6.5thp_80ths"
      - "diff_ths_256prompt_72frame_6.5thp_90ths"
    thp_7_0:
      - "diff_thp_256prompt_72frame_7.0thp_80ths"
    thp_8_0:
      - "diff_thp_256prompt_72frame_8.0thp_80ths"
    thp_9_0:
      - "diff_thp_256prompt_72frame_9.0thp_80ths"
    thp_10_0:
      - "diff_thp_256prompt_72frame_10.0thp_80ths"
      - "diff_ths_256prompt_72frame_10.0thp_70ths"
      - "diff_ths_256prompt_72frame_10.0thp_80ths"
      - "diff_ths_256prompt_72frame_10.0thp_90ths"
  by_ths:
    ths_70:
      - "diff_ths_256prompt_72frame_10.0thp_70ths"
      - "diff_ths_256prompt_72frame_6.4thp_70ths"
      - "diff_ths_256prompt_72frame_6.5thp_70ths"
    ths_80:
      - "diff_thp_256prompt_72frame_10.0thp_80ths"
      - "diff_thp_256prompt_72frame_6.5thp_80ths"
      - "diff_thp_256prompt_72frame_7.0thp_80ths"
      - "diff_thp_256prompt_72frame_8.0thp_80ths"
      - "diff_thp_256prompt_72frame_9.0thp_80ths"
      - "diff_ths_256prompt_72frame_10.0thp_80ths"
      - "diff_ths_256prompt_72frame_6.4thp_80ths"
      - "diff_ths_256prompt_72frame_6.5thp_80ths"
    ths_90:
      - "diff_ths_256prompt_72frame_10.0thp_90ths"
      - "diff_ths_256prompt_72frame_6.4thp_90ths"
      - "diff_ths_256prompt_72frame_6.5thp_90ths"

protocol:
  fps_eval: 8
  num_frames: 295
  resize: 256
  frame_sampling: "uniform"
  frame_padding: "loop"

metrics:
  enabled:
    - "vbench_temporal"

  vbench:
    enabled: true
    backend: "vbench_long"
    use_long: true
    strict_integrity: true
    require_full_coverage: true
    group_mismatch_warn_only: false
    preprocess_workers: 48
    slow_dims_fused: true
    slow_dims_decode_total_workers: 48
    slow_dims_decode_prefetch: 24
    slow_dims_decode_backend: "decord"
    slow_dims_shard_mode: "clip"
    slow_dims_perf_window_clips: 5
    slow_dims_stage_profile: true
    grit_batch_parallel_enable: false
    grit_batch_size: 1
    grit_batch_adaptive_fallback_enable: false
    appearance_style_batch_enable: true
    appearance_style_batch_size: 16
    dynamic_degree_batch_enable: true
    dynamic_degree_pair_batch_size: 8
    batch_accel_fp16_enable: false
    batch_accel_strict_fp32: true
    scale_to_percent: []
    profile_output: "group_summary_lite12d.csv"
    dimension_profile: "long_12"
    mode: "long_custom_input"
    use_semantic_splitting: false
    clip_length_config: "clip_length_mix.yaml"
    static_filter_flag: false
    scene_threshold: 35.0
    sb_clip2clip_feat_extractor: "dino"
    bg_clip2clip_feat_extractor: "clip"
    subtasks:
      - "subject_consistency"
      - "background_consistency"
      - "temporal_flickering"
      - "motion_smoothness"
      - "temporal_style"
      - "appearance_style"
      - "scene"
      - "human_action"
      - "overall_consistency"
      - "dynamic_degree"
      - "imaging_quality"
      - "aesthetic_quality"

runtime:
  device: "cuda"
  batch_size: 1
  num_workers: 4
  seed: 42

paths:
  cache_dir: "./eval_cache"
  output_dir: "./outputs/pyramid-forcing-fftv3"
  metadata_file: "metadata.csv"
  processed_metadata: "processed_metadata.csv"
  per_video_metrics: "per_video_metrics.csv"
  group_summary: "group_summary.csv"
  runtime_csv: "runtime.csv"
  figures_dir: "./outputs/pyramid-forcing-fftv3/figs"
  experiment_output: "pyramid-forcing-fftv3.csv"

logging:
  level: "INFO"
  log_file: "./outputs/pyramid-forcing-fftv3/eval.log"
  console: true
