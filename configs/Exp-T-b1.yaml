# =============================================================================
# T2V-Eval Configuration - Exp-T-b1
# Batch-1 baseline for VBench slow dimensions (no batch parallel / no adaptive fallback)
# =============================================================================

dataset:
  repo_id: "kv-compression/AdaHead"
  split: "train"
  use_local_videos: true
  local_video_dir: "hf/AdaHead/Exp-K_StaOscCompression"
  prompt_files_by_group:
    k3_sta_posneg_osc_phase6_tail4: "hf/AdaHead/Exp-K_StaOscCompression/k3_sta_posneg_osc_phase6_tail4/prompts.csv"
    k6_deep_forcing: "hf/AdaHead/Exp-K_StaOscCompression/k6_deep_forcing/prompts.csv"
    k7_native_self_forcing_static21_sink1: "hf/AdaHead/Exp-K_StaOscCompression/k7_native_self_forcing_static21_sink1/prompts.csv"
  prompt_file: "hf/AdaHead/Exp-K_StaOscCompression/k3_sta_posneg_osc_phase6_tail4/prompts.csv"
  video_dir: "videos/Exp-T-b1"

groups:
  - name: "k3_sta_posneg_osc_phase6_tail4"
    description: "Static pos/neg oscillation, phase6 tail4"
    latent_frames: 120
    actual_frames: 480
  - name: "k6_deep_forcing"
    description: "Deep forcing variant"
    latent_frames: 120
    actual_frames: 480
  - name: "k7_native_self_forcing_static21_sink1"
    description: "Native self-forcing static21 sink1"
    latent_frames: 120
    actual_frames: 480

protocol:
  fps_eval: 8
  num_frames: 288
  resize: 256
  frame_sampling: "uniform"
  frame_padding: "loop"

metrics:
  enabled:
    - "vbench_temporal"

  vbench:
    enabled: true
    backend: "vbench_long"
    use_long: true
    strict_integrity: true
    require_full_coverage: true
    group_mismatch_warn_only: false
    color_min_coverage_ratio: 1.0
    color_fill_zero_on_no_object: false
    preprocess_workers: 48
    slow_dims_fused: true
    slow_dims_decode_total_workers: 48
    slow_dims_decode_prefetch: 24
    slow_dims_decode_backend: "decord"
    slow_dims_shard_mode: "clip"
    slow_dims_perf_window_clips: 5
    slow_dims_stage_profile: true
    grit_batch_parallel_enable: false
    grit_batch_size: 1
    grit_batch_low_drift_mode: false
    grit_batch_autocast: true
    grit_batch_deterministic: false
    grit_batch_sensitive_dims_single_image: []
    grit_batch_adaptive_fallback_enable: false
    grit_batch_adaptive_fallback_dims: []
    grit_batch_adaptive_probe_clips: 8
    grit_batch_adaptive_score_threshold: 0.02
    scale_to_percent: []
    profile_output: "group_summary_full16d.csv"
    dimension_profile: "long_16"
    mode: "long_custom_input"
    use_semantic_splitting: false
    clip_length_config: "clip_length_mix.yaml"
    static_filter_flag: false
    scene_threshold: 35.0
    sb_clip2clip_feat_extractor: "dino"
    bg_clip2clip_feat_extractor: "clip"
    subtasks:
      - "subject_consistency"
      - "background_consistency"
      - "temporal_flickering"
      - "motion_smoothness"
      - "temporal_style"
      - "appearance_style"
      - "scene"
      - "object_class"
      - "multiple_objects"
      - "spatial_relationship"
      - "human_action"
      - "color"
      - "overall_consistency"
      - "dynamic_degree"
      - "imaging_quality"
      - "aesthetic_quality"

runtime:
  device: "cuda"
  batch_size: 1
  num_workers: 4
  seed: 42

paths:
  cache_dir: "./eval_cache"
  output_dir: "./outputs/Exp-T-b1"
  metadata_file: "metadata.csv"
  processed_metadata: "processed_metadata.csv"
  per_video_metrics: "per_video_metrics.csv"
  group_summary: "group_summary.csv"
  runtime_csv: "runtime.csv"
  figures_dir: "./outputs/Exp-T-b1/figs"
  experiment_output: "Exp-T-b1.csv"

logging:
  level: "INFO"
  log_file: "./outputs/Exp-T-b1/eval.log"
  console: true
