denoising_step_list:
- 1000
- 750
- 500
- 250
warp_denoising_step: true
num_frame_per_block: 3
model_kwargs:
  local_attn_size: -1
  timestep_shift: 5.0

# HeadKV / AdaptiveKV
use_headkv: true
use_adaptive_headkv: true
headkv_config_path: configs/head_configs/classification_results.csv
headkv_policy_csv_path: configs/head_configs/classification_results.csv
headkv_default_capacity: 32760
headkv_code_map:
  "-1": 32760
  "1": 32760
  "2": 32760

# Pyramid-Forcing per-head policy:
#   osc (-1):            sink1 + cyclic(period=6, cap=3) + recent4
#   stable (1):          sink3 + stride(interval=6)      + recent4
#   stable_sparse (2):   sink3                           + recent4
headkv_dynamic_capacity: 31200
headkv_sink_tokens: 4680
sink_grid_decoupling: true

# Dynamic RoPE — window_clamp mode.
# sink_time_clamp_min/max use the pipeline defaults (18/21).
headkv_dynamic_rope_mode: window_clamp
history_time_soft_factor: 1.0

# Lag: disabled via empty offsets.
headkv_lag_offsets: []

# --- Per-label policy maps ---
# Cyclic is enabled implicitly because use_adaptive_headkv=true.
# cyclic_period/cyclic_osc_only/cyclic_dynamic_rope use defaults.
headkv_label_phase_bucket_map:
  "-1": 3

# Stride is enabled only for label=1.
# stride_interval/stride_dynamic_rope use defaults.
headkv_label_stride_enabled_map:
  "1": true

# Sink frames differ only for stable labels. Recent stays at the default 4 frames.
headkv_label_sink_frames_map:
  "1": 3
  "2": 3
